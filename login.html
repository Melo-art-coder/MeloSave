<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MelSave</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header"></div>
    <div class="theme-switch">

<button id="themeToggle">
🌙
</button>

</div>
<section class="login-page">
    <div class="login-box">
        <h1>Welcome Back 💜</h1>
        <p>Log in to continue your savings journey.</p>
        <form id="loginForm">
            <input 
            type="email" 
            placeholder="Email Address" 
            required>
            <input 
            type="password" 
            placeholder="Password" 
            required>
            <button type="submit">
                Login
            </button>
            <button 
type="button" 
id="biometricBtn" 
class="biometric-btn">

🔐 Login with Biometrics

</button>
        </form>
        <p class="signup-link">
            Don't have an account?
            <a href="signup.html">Sign Up</a>
        </p>
    </div>
</section>
<script src="script.js"></script>
</body>
</html>
